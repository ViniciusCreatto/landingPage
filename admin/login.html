<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel Administrativo NexusTech">
    <meta name="author" content="NexusTech">
    
    <title>Login - Painel Admin | NexusTech</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="../assets/css/admin.css" as="style">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/admin.css">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <img src="../assets/images/logo.svg" alt="Logo NexusTech">
                    <span>NexusTech</span>
                </div>
                <h1>Painel Administrativo</h1>
                <p>Faça login para acessar o sistema</p>
            </div>
            
            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="admin@nexustech.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                        <button type="button" class="toggle-password" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Lembrar-me
                    </label>
                    <a href="#" class="forgot-password">Esqueci minha senha</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>
            
            <div class="login-footer">
                <p>&copy; 2024 NexusTech. Todos os direitos reservados.</p>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="../assets/js/admin.js"></script>
</body>
</html>
