<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerenciamento de Usuários - Painel Admin NexusTech">
    <meta name="author" content="NexusTech">
    
    <title>Usuários - Painel Admin | NexusTech</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="../assets/css/admin.css" as="style">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/admin.css">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Users specific styles */
        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .users-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .users-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .search-box {
            position: relative;
            width: 300px;
        }
        
        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            transition: var(--transition);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }
        
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .user-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
            transition: var(--transition);
            border-left: 4px solid var(--primary-color);
        }
        
        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .user-card.inactive {
            border-left-color: var(--text-light);
            opacity: 0.7;
        }
        
        .user-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            position: relative;
        }
        
        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .user-status {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .user-status.active {
            background: var(--secondary-color);
        }
        
        .user-status.inactive {
            background: var(--text-light);
        }
        
        .user-info h3 {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        
        .user-info p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .user-details {
            margin-bottom: 1rem;
        }
        
        .user-detail {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .user-detail i {
            width: 20px;
            color: var(--text-light);
        }
        
        .user-role {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        
        .user-role.admin {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }
        
        .user-role.manager {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning-color);
        }
        
        .user-role.user {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
        }
        
        .user-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        
        .modal-close:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            border-radius: 2px;
            background: var(--bg-tertiary);
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            transition: var(--transition);
            border-radius: 2px;
        }
        
        .password-strength-bar.weak {
            width: 33%;
            background: var(--danger-color);
        }
        
        .password-strength-bar.medium {
            width: 66%;
            background: var(--warning-color);
        }
        
        .password-strength-bar.strong {
            width: 100%;
            background: var(--secondary-color);
        }
        
        .password-strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            color: var(--text-secondary);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .users-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .users-actions {
                width: 100%;
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
            
            .users-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                width: 95%;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="admin-header">
                <div class="admin-logo">
                    <img src="../assets/images/logo.svg" alt="Logo NexusTech">
                    <span>NexusTech</span>
                </div>
            </div>
            
            <nav class="admin-nav">
                <a href="dashboard.html" class="admin-nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="calendar.html" class="admin-nav-item">
                    <i class="fas fa-calendar"></i>
                    <span>Calendário</span>
                </a>
                <a href="content.html" class="admin-nav-item">
                    <i class="fas fa-edit"></i>
                    <span>Conteúdo</span>
                </a>
                <a href="users.html" class="admin-nav-item active">
                    <i class="fas fa-users"></i>
                    <span>Usuários</span>
                </a>
                <a href="#" class="admin-nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Configurações</span>
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="admin-main">
            <!-- Topbar -->
            <header class="admin-topbar">
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline" id="sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="ml-3 mb-0">Gerenciamento de Usuários</h1>
                </div>
                
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline" id="notifications-btn">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    
                    <div class="dropdown" style="position: relative;">
                        <button class="btn btn-outline" id="user-menu-btn">
                            <i class="fas fa-user"></i>
                            <span>Admin</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        
                        <div class="dropdown-menu" id="user-menu" style="
                            position: absolute;
                            right: 0;
                            top: 100%;
                            background: white;
                            border-radius: 8px;
                            box-shadow: var(--shadow-lg);
                            min-width: 200px;
                            display: none;
                            z-index: 1000;
                        ">
                            <a href="#" class="dropdown-item" style="
                                display: block;
                                padding: 0.75rem 1rem;
                                color: var(--text-primary);
                                text-decoration: none;
                                transition: var(--transition);
                            " onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='white'">
                                <i class="fas fa-user"></i> Meu Perfil
                            </a>
                            <a href="#" class="dropdown-item" style="
                                display: block;
                                padding: 0.75rem 1rem;
                                color: var(--text-primary);
                                text-decoration: none;
                                transition: var(--transition);
                            " onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='white'">
                                <i class="fas fa-cog"></i> Configurações
                            </a>
                            <hr style="margin: 0.5rem 0; border: none; border-top: 1px solid var(--border-color);">
                            <button class="btn btn-danger btn-sm" id="logout-btn" style="
                                width: calc(100% - 2rem);
                                margin: 0.5rem 1rem;
                            ">
                                <i class="fas fa-sign-out-alt"></i> Sair
                            </button>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Content -->
            <div class="admin-content">
                <!-- Users Header -->
                <div class="users-header">
                    <h2 class="users-title">Usuários do Sistema</h2>
                    <div class="users-actions">
                        <div class="search-box">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" class="search-input" id="user-search" placeholder="Buscar usuários...">
                        </div>
                        <button class="btn btn-primary" id="add-user-btn">
                            <i class="fas fa-plus"></i> Novo Usuário
                        </button>
                    </div>
                </div>
                
                <!-- Users Grid -->
                <div class="users-grid" id="users-grid">
                    <!-- Users will be loaded here -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Add/Edit User Modal -->
    <div class="modal" id="user-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Novo Usuário</h3>
                <button class="modal-close" id="modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="user-form">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="user-name">Nome Completo</label>
                            <input type="text" class="form-control" id="user-name" required>
                        </div>
                        <div class="form-group">
                            <label for="user-email">Email</label>
                            <input type="email" class="form-control" id="user-email" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="user-phone">Telefone</label>
                            <input type="tel" class="form-control" id="user-phone" placeholder="(11) 9999-9999">
                        </div>
                        <div class="form-group">
                            <label for="user-role">Função</label>
                            <select class="form-control" id="user-role" required>
                                <option value="">Selecione uma função</option>
                                <option value="admin">Administrador</option>
                                <option value="manager">Gerente</option>
                                <option value="user">Usuário</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="user-password">Senha</label>
                            <input type="password" class="form-control" id="user-password" required>
                            <div class="password-strength">
                                <div class="password-strength-bar" id="password-strength-bar"></div>
                            </div>
                            <div class="password-strength-text" id="password-strength-text">Força da senha</div>
                        </div>
                        <div class="form-group">
                            <label for="user-confirm-password">Confirmar Senha</label>
                            <input type="password" class="form-control" id="user-confirm-password" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="user-status">Status</label>
                        <select class="form-control" id="user-status" required>
                            <option value="active">Ativo</option>
                            <option value="inactive">Inativo</option>
                        </select>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" id="cancel-btn">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/users-manager.js"></script>
</body>
</html>
