  <!-- Texto -->
  <text x="60" y="35" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#FFFFFF" font-weight="600">
    Lumora
  </text>
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#FFFFFF">
